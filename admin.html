<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>软考后台 · 激活管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #e8edf3 0%, #d5dee8 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
        }
        .admin-wrapper {
            max-width: 860px; width: 100%; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px); border-radius: 40px;
            box-shadow: 0 30px 60px -16px rgba(0,20,30,0.35);
            padding: 24px 20px;
        }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #e2eaf2;
            flex-wrap: wrap; gap: 12px;
        }
        .admin-header h1 { font-size: 1.5rem; color: #0a2a38; }
        .admin-header h1 i { color: #2f7a9e; margin-right: 10px; }
        .admin-header .logout-btn {
            background: #eef4f9; border: none; padding: 8px 18px; border-radius: 40px;
            font-weight: 600; color: #b13e3e; cursor: pointer;
            border: 1px solid #f0d0d0;
        }
        .admin-header .logout-btn:hover { background: #fde8e8; }

        .login-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
            z-index: 999;
        }
        .login-box {
            background: white; border-radius: 40px; padding: 32px 28px; max-width: 380px; width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 { font-size: 1.3rem; color: #0a2a38; margin-bottom: 8px; }
        .login-box p { color: #5f7e93; margin-bottom: 20px; font-size: 0.9rem; }
        .login-box input {
            width: 100%; padding: 12px 18px; border: 1.5px solid #d5e3ec; border-radius: 60px;
            font-size: 1rem; outline: none; margin-bottom: 14px; background: #f2f8fe;
        }
        .login-box input:focus { border-color: #2f8db0; background: white; }
        .login-box .btn-login {
            width: 100%; padding: 12px; background: #1a4d66; color: white; border: none;
            border-radius: 60px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .login-box .btn-login:hover { background: #0f3f55; }
        .login-error { color: #b13e3e; font-size: 0.9rem; margin-top: 6px; display: none; }
        .login-box .config-hint {
            margin-top: 12px; font-size: 0.75rem; color: #8aaec2; text-align: center;
            border-top: 1px solid #eee; padding-top: 12px;
        }

        .stats-bar {
            display: flex; gap: 20px; background: #eaf3fa; padding: 12px 20px;
            border-radius: 60px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stats-bar span { font-weight: 500; color: #1f4b62; font-size: 0.9rem; }
        .stats-bar span i { color: #2f7a9e; margin-right: 6px; }

        .add-area {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
        }
        .add-area input {
            flex: 1; min-width: 150px; padding: 12px 18px; border: 1.5px solid #d5e3ec;
            border-radius: 60px; font-size: 1rem; outline: none; background: #f2f8fe;
        }
        .add-area input:focus { border-color: #2f8db0; background: white; }
        .add-area .btn-add {
            padding: 12px 28px; background: #1f7a5a; color: white; border: none;
            border-radius: 60px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .add-area .btn-add:hover { background: #146348; }
        .add-area .btn-refresh {
            padding: 12px 20px; background: #dce8f2; color: #1f4b62; border: none;
            border-radius: 60px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .add-area .btn-refresh:hover { background: #c5dceb; }

        .table-wrap {
            background: #f8fbfe; border-radius: 20px; overflow: hidden;
            border: 1px solid #e2eaf2;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; background: #eaf3fa; color: #174052; font-weight: 600; font-size: 0.85rem; }
        td { padding: 12px 16px; border-top: 1px solid #e8eef5; color: #1f3d4f; }
        .phone-cell { font-weight: 600; font-size: 1rem; letter-spacing: 0.5px; }
        .badge-bound { background: #dff0e6; color: #1b6b4a; padding: 3px 12px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; }
        .btn-delete {
            background: #fee8e8; border: none; padding: 5px 14px; border-radius: 40px;
            color: #b13e3e; font-weight: 600; cursor: pointer;
        }
        .btn-delete:hover { background: #fcd5d5; }
        .empty-row td { text-align: center; color: #8aaec2; padding: 30px 20px; }
        .loading-row td { text-align: center; color: #5f7e93; padding: 30px 20px; }

        .footer-tip { margin-top: 16px; font-size: 0.8rem; color: #5f7e93; text-align: center; }
        .footer-tip i { color: #2f7a9e; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1a2a38; color: white; padding: 12px 24px; border-radius: 60px;
            font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.4s;
            pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 0.9rem;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #1f7a5a; }
        .toast.error { background: #b13e3e; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .admin-wrapper { padding: 16px 14px; border-radius: 28px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 10px; }
            .admin-header h1 { font-size: 1.2rem; }
            .stats-bar { flex-direction: column; gap: 6px; padding: 12px 16px; border-radius: 40px; }
            .stats-bar span { font-size: 0.85rem; }
            .add-area { flex-direction: column; }
            .add-area input { min-width: unset; }
            .add-area .btn-add, .add-area .btn-refresh { justify-content: center; padding: 12px; }

            .table-wrap {
                background: transparent;
                border: none;
                box-shadow: none;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                display: none;
            }
            tr {
                background: white;
                margin-bottom: 10px;
                padding: 14px 16px;
                border-radius: 14px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                border: 1px solid #e8eef5;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
            }
            td {
                border: none;
                padding: 0;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            td:first-child {
                font-weight: 600;
                font-size: 1rem;
                width: 100%;
                margin-bottom: 4px;
            }
            td:nth-child(2) {
                font-size: 0.85rem;
            }
            td:last-child {
                margin-left: auto;
            }
            .phone-cell { font-size: 1rem; }
            .btn-delete { padding: 6px 16px; font-size: 0.85rem; }
            .login-box { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2><i class="fas fa-lock" style="color:#2f7a9e;"></i> 管理员登录</h2>
        <p>输入密码进入后台管理</p>
        <input type="password" id="adminPwdInput" placeholder="请输入管理密码" autocomplete="off">
        <button class="btn-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <div class="login-error" id="loginError">❌ 密码错误，请重试</div>
        <div class="config-hint">
            <i class="fas fa-info-circle"></i> 默认密码: admin888
        </div>
    </div>
</div>

<div class="admin-wrapper" id="adminMain" style="display:none;">
    <div class="admin-header">
        <h1><i class="fas fa-users-cog"></i> 软考 · 激活管理</h1>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <span class="sync-status" id="syncStatus"><i class="fas fa-cloud-upload-alt"></i> 已同步</span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>

    <div class="stats-bar">
        <span><i class="fas fa-phone-alt"></i> 已激活: <strong id="totalCount">0</strong> 个</span>
        <span><i class="fas fa-github"></i> 数据存储于 GitHub Issues</span>
    </div>

    <div class="add-area">
        <input type="tel" id="newPhoneInput" placeholder="输入11位手机号" maxlength="11">
        <button class="btn-add" id="addBtn"><i class="fas fa-plus-circle"></i> 激活</button>
        <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>手机号</th><th>状态</th><th style="text-align:right;">操作</th></tr>
            </thead>
            <tbody id="phoneTableBody">
                <tr class="loading-row"><td colspan="3"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-tip">
        <i class="fas fa-github"></i> 数据存储在 GitHub Issues 中，换电脑也能同步管理
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const GITHUB_TOKEN = urlParams.get('token');
        if (!GITHUB_TOKEN) {
            document.body.innerHTML = '<div style="padding:50px;text-align:center;font-size:18px;color:#b13e3e;">⚠️ 缺少 token 参数<br><br><small>访问格式: admin.html?token=你的Token</small></div>';
            throw new Error('缺少 token 参数');
        }

        const REPO_OWNER = '51ruankao';      // 替换为你的 GitHub 用户名
        const REPO_NAME = 'xinjian_shipin';   // 替换为你的仓库名
        const LABEL_ACTIVATED = '已激活';
        const ADMIN_PASSWORD = 'admin888';

        async function fetchPhoneList() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${encodeURIComponent(LABEL_ACTIVATED)}&state=open&per_page=100`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!response.ok) throw new Error(`GitHub API 错误: ${response.status}`);
            const issues = await response.json();
            return issues.map(i => i.title.trim());
        }

        async function addPhoneToGitHub(phone) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: phone,
                    labels: [LABEL_ACTIVATED],
                    body: `激活手机号: ${phone}\n激活时间: ${new Date().toLocaleString()}`
                })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || '添加失败');
            }
            return await response.json();
        }

        async function deletePhoneFromGitHub(phone) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${encodeURIComponent(LABEL_ACTIVATED)}&state=open&per_page=100`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!response.ok) throw new Error('查找失败');
            const issues = await response.json();
            const target = issues.find(i => i.title.trim() === phone);
            if (!target) throw new Error('未找到该手机号');
            const closeUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${target.number}`;
            const closeRes = await fetch(closeUrl, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ state: 'closed' })
            });
            if (!closeRes.ok) throw new Error('删除失败');
            return true;
        }

        const loginOverlay = document.getElementById('loginOverlay');
        const adminMain = document.getElementById('adminMain');
        const adminPwdInput = document.getElementById('adminPwdInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const phoneTableBody = document.getElementById('phoneTableBody');
        const totalCount = document.getElementById('totalCount');
        const syncStatus = document.getElementById('syncStatus');
        const newPhoneInput = document.getElementById('newPhoneInput');
        const addBtn = document.getElementById('addBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const toast = document.getElementById('toast');

        let toastTimer = null;

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function renderTable() {
            phoneTableBody.innerHTML = `<tr class="loading-row"><td colspan="3"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr>`;
            try {
                const list = await fetchPhoneList();
                totalCount.textContent = list.length;
                syncStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#1b7a4a;"></i> 已同步 (${new Date().toLocaleTimeString()})`;
                if (list.length === 0) {
                    phoneTableBody.innerHTML = `<tr class="empty-row"><td colspan="3">暂无激活手机号</td></tr>`;
                    return;
                }
                let html = '';
                list.forEach(phone => {
                    html += `<tr><td class="phone-cell">${phone}</td><td><span class="badge-bound"><i class="fas fa-check-circle"></i> 已激活</span></td><td style="text-align:right;"><button class="btn-delete" data-phone="${phone}"><i class="fas fa-trash-alt"></i> 撤销</button></td></tr>`;
                });
                phoneTableBody.innerHTML = html;
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const phone = this.dataset.phone;
                        if (!confirm(`确定要撤销 ${phone} 的激活吗？`)) return;
                        try {
                            await deletePhoneFromGitHub(phone);
                            showToast(`✅ ${phone} 已撤销`, 'success');
                            await renderTable();
                        } catch(e) { showToast(`❌ ${e.message}`, 'error'); }
                    });
                });
            } catch(e) {
                syncStatus.innerHTML = `<i class="fas fa-exclamation-circle" style="color:#b13e3e;"></i> 同步失败: ${e.message}`;
                phoneTableBody.innerHTML = `<tr class="empty-row"><td colspan="3">⚠️ 加载失败: ${e.message}</td></tr>`;
                showToast(`❌ ${e.message}`, 'error');
            }
        }

        async function handleAddPhone() {
    const phone = newPhoneInput.value.trim();
    if (!/^\d{11}$/.test(phone)) {
        showToast('❌ 请输入11位有效手机号', 'error');
        return;
    }
    try {
        // 先获取当前已激活列表
        const list = await fetchPhoneList();
        // 检查手机号是否已存在
        if (list.includes(phone)) {
            showToast('⚠️ 该手机号已激活，请勿重复添加', 'error');
            newPhoneInput.value = '';
            return;
        }
        // 不存在则添加
        await addPhoneToGitHub(phone);
        showToast(`✅ ${phone} 激活成功`, 'success');
        newPhoneInput.value = '';
        await renderTable();
    } catch (e) {
        showToast(`❌ ${e.message}`, 'error');
    }
}

        function login() {
            if (adminPwdInput.value.trim() === ADMIN_PASSWORD) {
                loginOverlay.style.display = 'none';
                adminMain.style.display = 'block';
                loginError.style.display = 'none';
                renderTable();
                adminPwdInput.value = '';
            } else {
                loginError.style.display = 'block';
                setTimeout(() => loginError.style.display = 'none', 3000);
            }
        }

        function logout() {
            if (confirm('确认退出后台？')) {
                loginOverlay.style.display = 'flex';
                adminMain.style.display = 'none';
                adminPwdInput.value = '';
            }
        }

        loginBtn.addEventListener('click', login);
        adminPwdInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
        logoutBtn.addEventListener('click', logout);
        addBtn.addEventListener('click', handleAddPhone);
        newPhoneInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); handleAddPhone(); } });
        newPhoneInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
        refreshBtn.addEventListener('click', renderTable);

        console.log('🔐 软考后台管理已加载 (GitHub Issues 存储)');
        console.log(`📁 仓库: ${REPO_OWNER}/${REPO_NAME}`);
        console.log('📞 默认密码: admin888');
    })();
</script>
</body>
</html>
