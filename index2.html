        .app-wrapper { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.65); backdrop-filter: blur(14px); border-radius: 40px; padding: 24px 20px; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px dashed rgba(0,40,60,0.10); }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: #1a3b4f; color: white; width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-weight: 700; font-size: 1.5rem; color: #0a2a38; }
        .logo-text span { color: #2f7a9e; font-weight: 300; }
        .activation-badge { background: #ffffffcc; padding: 8px 18px; border-radius: 100px; font-weight: 500; color: #1f4b62; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }

        .activation-input-group input { flex: 1; min-width: 150px; padding: 12px 18px; border: 1.5px solid #d5e3ec; border-radius: 60px; font-size: 1rem; background: #f2f8fe; outline: none; }

        .btn { background: #eef4f9; border: none; padding: 12px 28px; border-radius: 60px; font-weight: 600; font-size: 0.95rem; color: #1f4b62; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.6); }
        .btn-primary { background: #1a4d66; color: white; border: 1px solid #2b6d8a; }
        .btn-primary:hover { background: #0f3f55; transform: scale(1.02); }
        .btn-danger { background: #b13e3e; color: white; border: 1px solid #8a2e2e; padding: 5px 14px; font-size: 0.8rem; }

        .status-message.error { background: #ffe6e6; color: #b13e3e; }

        .folder-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; border-radius: 28px; }
        .folder-header:hover { background: rgba(200,220,240,0.15); }
        .folder-header-left { display: flex; align-items: center; gap: 12px; }
        .folder-header-left i { font-size: 1.4rem; color: #2f7a9e; width: 30px; text-align: center; }
        .folder-header-left h2 { font-size: 1.2rem; font-weight: 700; color: #123b4f; }
        .folder-header-left .badge-count { background: #c5dceb; padding: 3px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #104257; margin-left: 6px; }
        .folder-toggle { font-size: 1.1rem; color: #4f7f99; transition: transform 0.25s ease; }
        .folder-toggle.open { transform: rotate(180deg); }
        .folder-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.2s ease; padding: 0 20px; }
        .folder-content.open { max-height: 5000px; padding: 0 20px 20px 20px; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 18px; margin-top: 4px; }
        .video-card { background: #ffffffdd; border-radius: 20px; padding: 12px; box-shadow: 0 4px 12px -6px rgba(0,30,40,0.04); border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0,50,70,0.12); border-color: #cce0ed; }

        .video-thumbnail img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; background: #e8edf3; }
        .video-thumbnail img.loaded { opacity: 1; }
        .video-thumbnail .lock-overlay { position: absolute; inset: 0; background: rgba(10,30,42,0.45); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #ffd966; }
        .video-thumbnail .lock-overlay i { position: static; }
        .video-meta { flex: 1; display: flex; flex-direction: column; }
        .video-title { font-weight: 700; font-size: 0.9rem; color: #12303f; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
        .video-title .section-num { font-size: 0.6rem; background: #dce8f2; padding: 2px 10px; border-radius: 40px; font-weight: 600; color: #1a4d66; }
        .video-desc { color: #4d6f86; font-size: 0.75rem; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        .video-desc i { color: #598aa8; font-size: 0.7rem; }
        .video-player-container {
            margin-top: 2px;
            border-radius: 14px;
            overflow: hidden;
            background: #f0f4f8;
            width: 100%;
            aspect-ratio: 16/9;
        }
        .video-player-container video {
            width: 100%;
            height: 100%;
            display: block;
            background: #f0f4f8;
            object-fit: contain;
        }
        .video-card.locked .video-player-container { display: none; }
        .video-card.locked .video-player-placeholder { display: flex; }
        .video-player-placeholder {
            background: #eaf2f9;
            border-radius: 60px;
            padding: 8px 12px;
            text-align: center;
            font-weight: 500;
            color: #21506a;
            border: 1px dashed #b6d0e0;
            margin-top: 2px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 40px;
        }
        .video-card.locked .video-player-placeholder { background: #f2f2f2; color: #7d7d7d; border-color: #d6d6d6; }
        .video-card.locked .video-player-placeholder i { color: #a0a0a0; }
        .unlock-hint { margin-top: 6px; font-size: 0.65rem; color: #5f7e93; background: #eaf3fa; padding: 2px 12px; border-radius: 60px; display: inline-block; align-self: flex-start; }

        .footer-note { margin-top: 32px; text-align: center; color: #406b81; font-size: 0.8rem; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
        .footer-note i { margin-right: 4px; color: #2d7a9e; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2a38; color: white; padding: 12px 24px; border-radius: 60px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.4s; pointer-events: none; font-size: 0.9rem; }
        .toast.show { opacity: 1; }
        .toast.success { background: #1f7a5a; }
        .toast.error { background: #b13e3e; }
        .activated-user { display: inline-flex; align-items: center; gap: 10px; background: #dff0e6; padding: 6px 16px; border-radius: 60px; color: #1b6b4a; font-weight: 500; margin: 0 auto; font-size: 0.9rem; }

        .remembered-area { text-align: center; margin-bottom: 16px; display: none; }

        .subject-title-area {

            margin-bottom: 24px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(26,77,102,0.08), rgba(47,141,176,0.08));
            border-radius: 20px;
            border: 1px solid rgba(47,141,176,0.15);
        }
        .subject-title-area h1 {
            font-size: 1.6rem;
            color: #0a2a38;
        }
        .subject-title-area h1 i {
            color: #2f7a9e;
            margin-right: 12px;
        }
        .subject-title-area p {
            color: #4d6f86;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .video-thumbnail .placeholder-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #e8edf3 25%, #d5dce6 50%, #e8edf3 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 0;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .video-thumbnail img {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {

            .activation-area {
                padding: 6px 10px !important;

            .status-message {
                font-size: 0.7rem !important;

            .activation-input-group label {

            .activation-input-group {

                flex-wrap: wrap !important;
                align-items: center !important;
                gap: 4px !important;
            }
            .activation-input-group input {

                padding: 4px 10px !important;
                font-size: 0.75rem !important;

                border-radius: 40px !important;
                background: #f2f8fe !important;
                outline: none !important;
            }
            .activation-input-group .btn {

                padding: 4px 12px !important;
                font-size: 0.7rem !important;
                height: 30px !important;
            }

            .folder-header { padding: 12px 14px; }
            .folder-header-left h2 { font-size: 1rem; }
            .folder-content { padding: 0 14px; }
            .folder-content.open { padding: 0 14px 14px 14px; }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .video-thumbnail { border-radius: 10px; }
            .video-title { font-size: 0.8rem; flex-wrap: wrap; gap: 2px; }
            .video-title .section-num { font-size: 0.5rem; padding: 1px 8px; }
            .video-desc { font-size: 0.65rem; }
            .video-player-placeholder { font-size: 0.65rem; padding: 4px 8px; min-height: 30px; }
            .unlock-hint { font-size: 0.55rem; padding: 1px 8px; }
            .activation-badge { font-size: 0.75rem; padding: 6px 14px; }
            .footer-note { font-size: 0.7rem; gap: 10px; }
            .activated-user { font-size: 0.8rem; padding: 4px 12px; }
            .toast { font-size: 0.8rem; padding: 10px 18px; bottom: 16px; }
            .subject-title-area h1 { font-size: 1.2rem; }
            .subject-title-area p { font-size: 0.8rem; }
        }

        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .video-title { font-size: 0.75rem; }

            .activation-input-group input {
                min-width: 50px !important;
                padding: 3px 8px !important;
                font-size: 0.7rem !important;
                height: 26px !important;

                height: 26px !important;

</head>

                    { title: '试题选讲（一）', desc: '第1-6章试题选讲（一）', filename: 'shiti1-6(1).mp4' },
                    { title: '试题选讲（二）', desc: '第1-6章试题选讲（二）', filename: 'shiti1-6(2).mp4' },
                    { title: '试题选讲（三）', desc: '第7-16章试题选讲（一）', filename: 'shiti7-16(1).mp4' },
                    { title: '试题选讲（四）', desc: '第7-16章试题选讲（二）', filename: 'shiti7-16(2).mp4' },
                    { title: '试题选讲（五）', desc: '第17-25章试题选讲（一）', filename: 'shiti17-25(1).mp4' },
                    { title: '试题选讲（六）', desc: '第17-25章试题选讲（二）', filename: 'shiti17-25(2).mp4' }
                ]
            },
            {
                id: 'anli',
                name: '案例专项',
                icon: 'fa-star',
                poster: 'anli.jpg',
                videos: [
                    { title: '案例专项', desc: '案例分析答题技巧', filename: '26anlizhuanxiang.mp4' }
                ]
            }
        ];

        function getVideoUrl(filename) {
            return BASE_VIDEO_URL + filename;
        }

        function getPosterUrl(filename) {
            return BASE_POSTER_URL + filename;
        }

        // ================================================================
        // ★★★ 全局视频管理 ★★★
        // ================================================================
        let allVideos = [];

        function pauseAllOtherVideos(currentVideo) {
            allVideos.forEach(function(video) {
                if (video !== currentVideo && !video.paused) {
                    video.pause();
                }
            });
        }

        // ================================================================
        // ★★★ 图片懒加载（优化版） ★★★
        // ================================================================
        function initLazyLoading() {
            const images = document.querySelectorAll('.video-thumbnail img');
            
            if (!('IntersectionObserver' in window)) {
                images.forEach(img => {
                    img.classList.add('loaded');
                });
                return;
            }

            const imageObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.onload = function() {
                            this.classList.add('loaded');
                        };
                        if (img.complete) {
                            img.classList.add('loaded');
                        }
                        imageObserver.unobserve(img);
                    }
                });
            }, {
                rootMargin: '300px 0px 300px 0px',
                threshold: 0.01
            });

            images.forEach(img => {
                imageObserver.observe(img);
            });
        }

        // ================================================================
        // localStorage 操作
        // ================================================================
        function getStoredPhone() {
            try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
        }
        function setStoredPhone(phone) {
            try { localStorage.setItem(STORAGE_KEY, phone); } catch(e) {}
        }
        function clearStoredPhone() {
            try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
        }

        // ================================================================
        // DOM 操作
        // ================================================================
        const container = document.getElementById('subjectContainer');
        const phoneInput = document.getElementById('phoneInput');
        const activateBtn = document.getElementById('activateBtn');
        const statusMsg = document.getElementById('statusMessage');
        const globalStatusText = document.getElementById('globalStatusText');
        const toast = document.getElementById('toast');
        const rememberedArea = document.getElementById('rememberedArea');
        const rememberedPhoneDisplay = document.getElementById('rememberedPhoneDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const activationArea = document.getElementById('activationArea');

        let isActivated = false;
        let activePhone = '';
        let toastTimer = null;

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setStatus(message, type) {
            statusMsg.innerHTML = message;
            statusMsg.className = 'status-message';
            if (type === 'success') statusMsg.classList.add('success');
            if (type === 'error') statusMsg.classList.add('error');
        }

        // ================================================================
        // ★★★ 渲染函数（扁平结构，无二级分类） ★★★
        // ================================================================
        function renderCategories(activated) {
            if (!container) return;
            let html = '';

            categories.forEach((cat) => {
                const total = cat.videos.length;
                const poster = getPosterUrl(cat.poster);
                html += `<div class="subject-folder">
                    <div class="folder-header" data-target="${cat.id}">
                        <div class="folder-header-left">
                            <i class="fas ${cat.icon}"></i>
                            <h2>${cat.name}</h2>
                            <span class="badge-count">${total} 节</span>
                        </div>
                        <div class="folder-toggle" data-target="${cat.id}">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="folder-content" id="content-${cat.id}">
                        <div class="video-grid">`;

                cat.videos.forEach((v, i) => {
                    const unlocked = activated;
                    html += `<div class="video-card ${unlocked ? '' : 'locked'}">
                        <div class="video-thumbnail">
                            <img src="${poster}" loading="lazy">
                            <div class="lock-overlay" style="display:${unlocked ? 'none' : 'flex'}"><i class="fas fa-lock"></i></div>
                        </div>
                        <div class="video-meta">
                            <div class="video-title">
                                ${v.title}
                                <span class="section-num">${i+1}/${total}</span>
                            </div>
                            <div class="video-desc"><i class="fas fa-tag"></i> ${v.desc}</div>
                            <div class="video-player-container" style="display:${unlocked ? 'block' : 'none'}">
                                <video controls preload="metadata" poster="${poster}">
                                    <source src="${getVideoUrl(v.filename)}" type="video/mp4">
                                </video>
                            </div>
                            <div class="video-player-placeholder" style="display:${unlocked ? 'none' : 'flex'}">
                                <i class="fas fa-play-circle"></i> 激活后观看
                            </div>
                            <span class="unlock-hint">${unlocked ? '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁' : '<i class="fas fa-lock"></i> 需要激活'}</span>
                        </div>
                    </div>`;
                });

                html += `</div></div></div>`;
            });

            container.innerHTML = html;

            // 绑定视频事件
            allVideos = [];
            document.querySelectorAll('video').forEach(v => {
                allVideos.push(v);
                v.addEventListener('play', function() { pauseAllOtherVideos(this); });
            });

            // 懒加载（优化版）
            setTimeout(initLazyLoading, 200);

            // 折叠事件
            document.querySelectorAll('.folder-header').forEach(h => {
                h.addEventListener('click', function() {
                    const id = this.dataset.target;
                    const c = document.getElementById('content-' + id);
                    const icon = this.querySelector('.folder-toggle i');
                    if (c) {
                        c.classList.toggle('open');
                        this.querySelector('.folder-toggle').classList.toggle('open');
                        icon.className = c.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
                    }
                });
            });
        }

        function updateAllCards(activated) {
            document.querySelectorAll('.video-card').forEach(card => {
                const unlocked = activated;
                const overlay = card.querySelector('.lock-overlay');
                const container = card.querySelector('.video-player-container');
                const placeholder = card.querySelector('.video-player-placeholder');
                const hint = card.querySelector('.unlock-hint');
                if (unlocked) {
                    card.classList.remove('locked');
                    if (overlay) overlay.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'none';
                    if (container) container.style.display = 'block';
                    if (hint) { hint.innerHTML = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁'; hint.style.background = '#dff0e6'; hint.style.color = '#1b6b4a'; }
                } else {
                    card.classList.add('locked');
                    if (overlay) overlay.style.display = 'flex';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (container) container.style.display = 'none';
                    if (hint) { hint.innerHTML = '<i class="fas fa-lock"></i> 需要激活'; hint.style.background = '#eaf3fa'; hint.style.color = '#5f7e93'; }
                }
            });
            globalStatusText.textContent = activated ? `已激活 (${activePhone})` : '未激活';
            globalStatusText.style.color = activated ? '#1b7a4a' : '#b13e3e';
        }

        function showRememberedUser(phone) {
            rememberedPhoneDisplay.textContent = phone;
            rememberedArea.style.display = 'block';
            activationArea.style.display = 'none';
        }
        function hideRememberedUser() {
            rememberedArea.style.display = 'none';
            activationArea.style.display = 'flex';
        }

        async function performActivation(phone, remember) {
            if (!phone || !phone.trim()) { setStatus('⚠️ 请输入手机号码', 'error'); return false; }
            const raw = phone.trim();
            if (!/^\d{11}$/.test(raw)) { setStatus('❌ 请输入11位有效手机号', 'error'); return false; }
            setStatus('⏳ 正在验证...', 'info');
            try {
                const ok = await checkPhoneOnGitHub(raw);
                if (ok) {
                    isActivated = true; activePhone = raw;
                    setStatus('✅ 激活成功！欢迎回来', 'success');
                    updateAllCards(true);
                    phoneInput.value = raw;
                    showToast('✅ 欢迎回来，' + raw, 'success');
                    if (remember) { setStoredPhone(raw); showRememberedUser(raw); }
                    return true;
                } else {
                    isActivated = false; activePhone = '';
                    setStatus('❌ 该手机号未激活，请联系管理员', 'error');
                    updateAllCards(false);
                    showToast('❌ 手机号未激活', 'error');
                    return false;
                }
            } catch(e) {
                setStatus('❌ 验证失败: ' + e.message, 'error');
                showToast('❌ ' + e.message, 'error');
                return false;
            }
        }

        function deactivate() {
            isActivated = false; activePhone = '';
            setStatus('🔒 已退出激活', 'info');
            updateAllCards(false);
            phoneInput.value = '';
            clearStoredPhone();
            hideRememberedUser();
        }

        async function tryAutoLogin() {
            const stored = getStoredPhone();
            if (stored) {
                setStatus('⏳ 正在自动验证...', 'info');
                try {
                    const ok = await checkPhoneOnGitHub(stored);
                    if (ok) {
                        isActivated = true; activePhone = stored;
                        updateAllCards(true);
                        showRememberedUser(stored);
                        setStatus('✅ 已自动激活 (' + stored + ')', 'success');
                        showToast('✅ 欢迎回来，' + stored, 'success');
                        return true;
                    } else {
                        clearStoredPhone();
                        hideRememberedUser();
                        setStatus('📱 该手机号已被撤销，请重新输入', 'info');
                        return false;
                    }
                } catch(e) {
                    setStatus('📱 请手动输入手机号激活', 'info');
                    return false;
                }
            }
            return false;
        }

        async function init() {
            renderCategories(false);
            updateAllCards(false);
            const loggedIn = await tryAutoLogin();
            if (!loggedIn) {
                hideRememberedUser();
                setStatus('📱 输入已激活的手机号，解锁全部视频', 'info');
            }
            console.log('🎯 信息系统监理师视频学习平台已加载（扁平结构 + 懒加载优化）');
            console.log('📁 分类: 学前必看 → 工程知识 → 监理通识 → 监理实务 → 试题选讲 → 案例专项');
        }

        activateBtn.addEventListener('click', function() { performActivation(phoneInput.value, true); });
        phoneInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); activateBtn.click(); } });
        phoneInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
        logoutBtn.addEventListener('click', function() {
            if (confirm('确认退出当前账号？')) { deactivate(); hideRememberedUser(); setStatus('🔒 已退出，请输入手机号重新激活', 'info'); showToast('✅ 已退出', 'success'); }
        });

        init();
    })();
</script>
</body>
</html>
